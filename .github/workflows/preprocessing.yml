name: Mango Dataset Preprocessing

on:
  push:
  workflow_dispatch:

jobs:
  preprocess:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install -r preprocessing/requirements.txt

      - name: Run Preprocessing
        run: |
          cd preprocessing
          python automate_AuliaSilmi.py

      - name: Upload Dataset
        uses: actions/upload-artifact@v4
        with:
          name: mango_preprocessing
          path: preprocessing/mango_preprocessing
